services:
  saic-mqtt-gateway:
    image: "saicismartapi/saic-python-mqtt-gateway:latest"
    build:
      context: .
    restart: always
    container_name: "saic-mqtt-gateway"
    environment:
      - MQTT_URI=${MQTT_BROKER_URI}
      - MQTT_USER=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - SAIC_USER=${SAIC_USERNAME}
      - SAIC_PASSWORD=${SAIC_PWD}
      - CHARGING_STATIONS_JSON=/usr/src/app/config/charging-stations.json
    volumes:
      # - ./.secret.env:/usr/src/app/.env:ro  # Uncomment to use a secret environment file
      - ./examples:/usr/src/app/config/
